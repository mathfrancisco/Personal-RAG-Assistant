name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Tests + cobertura
        # CI usa apenas fakes/mocks — nenhuma chamada a API paga ou quota real.
        run: uv run pytest --cov=rag_assistant --cov-report=term-missing --cov-report=xml

      - name: Testes de modo local (zero rede)
        run: uv run pytest -m local_only
